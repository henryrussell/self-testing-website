name: Playwright Tests
on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - uses: actions/cache@v4
      with:
        path: |
          ~/.cache/ms-playwright
          node_modules
        key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-playwright-
    - name: Install dependencies
      run: npm ci
    - name: Run Unit tests
      run: npm run unit-tests
    - name: Generate Test Summary
      if: always()
      run: node scripts/generate-test-summary.js
    - name: Build
      run: npm run build
    - name: Run Application
      run: npm run start &
    - name: Waiting for Application
      run: npx wait-on http://localhost:3000/api/health
    - name: Confirm application is running
      run: curl localhost:3000/api/health
    - name: Install Playwright Browsers
      run: npx playwright install
    - name: Run Playwright tests
      run: npm run e2e-tests-headless
    - name: Apply Light Mode Theme to Playwright Report
      if: always()
      run: node scripts/inject-report-theme.js
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: coverage-report
        path: coverage/
        retention-days: 30
